name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.x"
      - name: Run unit tests
        run: python3 -m unittest discover -s tests
      - name: Validate skill package
        run: python3 tests/validate_skill.py skill-steward
